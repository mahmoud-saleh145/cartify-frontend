<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartify — Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./CSS/animate.min.css" />
    <link rel="stylesheet" href="./CSS/wow.min.css" />
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/mdb.min.css" />
    <link rel="stylesheet" href="./CSS/Style.css" />
  <link rel="stylesheet" href="./CSS/cartify-ui.css" />
    <link rel="stylesheet" href="./CSS/auth-screens.css" />
  </head>
  <body class="auth-page min-vh-100 d-flex flex-column align-items-center justify-content-center bg-light m-0">
    <div class="container d-flex flex-column align-items-center px-3">
      <div class="login-container bg-white rounded-5 shadow-lg p-5 animate__animated animate__zoomIn animate__faster" style="max-width:520px;width:100%;">
        <div class="d-flex align-items-center justify-content-center mx-auto mb-3">
          <div class="auth-icon-circle"><i class="fa-solid fa-key"></i></div>
        </div>
        <div class="text-center mb-4">
          <h1 class="h4 fw-bold mb-1 header-title">Forgot Password</h1>
          <p class="text-muted small mb-0">Enter your email address and we'll send a verification code to reset your password.</p>
        </div>
        <form id="forgot-form">
          <div class="mb-3">
            <label for="reset-email" class="form-label small fw-bold text-dark text-uppercase mb-1" style="letter-spacing:0.5px;font-size:0.72rem;">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0 rounded-pill-start ps-3">
                <i class="fa-regular fa-envelope text-muted"></i>
              </span>
              <input type="email" id="reset-email" class="form-control custom-input border-0 bg-light rounded-pill-end py-2 pe-3" placeholder="name@example.com" required />
            </div>
          </div>
          <div id="send-alert" class="rounded-3 px-3 py-2 mb-2 small fw-semibold" style="display:none;"></div>
          <button type="submit" id="send-btn" class="btn btn-primary w-100 rounded-pill py-2 mt-2 fw-bold primary-btn h-50">
            <span id="btn-text">Send Code</span>
            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
          </button>
        </form>
        <div class="text-center mt-4">
          <a href="login.html" class="small fw-bold text-decoration-none text-primary">
            <i class="fa-solid fa-arrow-left me-1"></i> Back to Login
          </a>
        </div>
      </div>
      <p class="text-muted mt-4" style="font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;">© 2026 Cartify. Secure Authentication.</p>
    </div>
    <script src="./Js/all.min.js"></script>
    <script src="./Js/wow.min.js"></script>
    <script>new WOW().init();</script>
    <script src="./Js/jquery.slim.min.js"></script>
    <script src="./Js/bootstrap.min.js"></script>
    <script src="./Js/mdb.umd.min.js"></script>
    <script>
      document.getElementById('forgot-form').addEventListener('submit', function(e) {
        e.preventDefault();
        var email = document.getElementById('reset-email').value.trim();
        var btn = document.getElementById('send-btn');
        var btnText = document.getElementById('btn-text');
        var spinner = document.getElementById('btn-spinner');
        var alertDiv = document.getElementById('send-alert');
        var otp = Math.floor(100000 + Math.random() * 900000).toString();
        sessionStorage.setItem('cartify_otp', otp);
        sessionStorage.setItem('cartify_email', email);
        btn.disabled = true;
        btnText.textContent = 'Sending...';
        spinner.classList.remove('d-none');
        alertDiv.style.display = 'none';
        // Simulate sending - in production this would call an email API
        setTimeout(function() {
          console.log('Demo OTP:', otp);
          window.location.href = 'verify-email.html';
        }, 800);
      });
    </script>
  </body>
</html>
