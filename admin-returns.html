<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cartify Admin — Return Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./CSS/all.min.css" />
  <link rel="stylesheet" href="./CSS/admin.css" />
</head>
<body>
  <aside class="admin-sidebar" id="admin-sidebar"></aside>

  <div class="admin-main">
    <header class="admin-header">
      <button class="hamburger" id="hamburger"><i class="fa-solid fa-bars"></i></button>
      <span class="page-title">Return Orders</span>
    </header>

    <div class="admin-content">
      <div class="panel">
        <!-- Toolbar -->
        <div class="table-toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="search" id="search-input" placeholder="Search by locker ID, reason…" />
          </div>
          <select class="filter-select" id="status-filter">
            <option value="">All statuses</option>
            <option value="pending">Pending</option>
            <option value="completed">Completed</option>
            <option value="expired">Expired</option>
            <option value="denied">Denied</option>
          </select>
          <select class="filter-select" id="image-filter">
            <option value="">All returns</option>
            <option value="with">With image</option>
            <option value="without">Without image</option>
          </select>
          <span id="table-info" style="margin-left:auto;font-size:.8rem;color:var(--neutral-400)"></span>
        </div>

        <!-- Table -->
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Return ID</th>
                <th>Locker User ID</th>
                <th>Items</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Weight</th>
                <th>Camera Image</th>
                <th>Date</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="returns-body">
              <tr><td colspan="9"><div class="spinner-wrap"><div class="spin"></div> Loading…</div></td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-bar">
          <span id="pg-info"></span>
          <div class="pagination-btns" id="pg-btns"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Return Detail Modal -->
  <div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
      <div class="modal-header">
        <i class="fa-solid fa-rotate-left" style="color:var(--accent)"></i>
        <span class="modal-title" id="modal-title">Return Details</span>
        <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="spinner-wrap"><div class="spin"></div></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAdmin, injectSidebar, fmtDate, fmtDateTime, statusBadge, buildPagination, generateLockerCode, toast } from './Js/admin-core.js';
    import { returnsAdminAPI, cameraAdminAPI } from './Js/admin-api.js';

    const user = await requireAdmin();
    if (!user) throw '';

    // Pending count for sidebar badge
    let pendingCount = 0;
    try {
      const pd = await returnsAdminAPI.getAll({ status: 'pending', limit: 1 });
      pendingCount = pd.data?.total || pd.total || 0;
    } catch {}
    injectSidebar(user, pendingCount);

    // ── State ─────────────────────────────────────────────────────────────────
    let page        = 1;
    const LIMIT     = 15;
    let totalPages  = 1;
    let searchTimer;
    const LOCKER_SECRET = ''; // Leave empty — code displayed only when secret is configured in admin

    // ── Load returns ──────────────────────────────────────────────────────────
    async function loadReturns() {
      const body   = document.getElementById('returns-body');
      body.innerHTML = `<tr><td colspan="9"><div class="spinner-wrap"><div class="spin"></div></div></td></tr>`;

      const search = document.getElementById('search-input').value.trim();
      const status = document.getElementById('status-filter').value;
      const imgFilter = document.getElementById('image-filter').value;

      const params = { page, limit: LIMIT };
      if (status) params.status = status;
      if (search) params.search = search;

      try {
        const res  = await returnsAdminAPI.getAll(params);
        let   rows = res.data?.returns || res.returns || res.data?.data?.returns || [];

        // Client-side filter by image presence (backend may not support this param)
        if (imgFilter === 'with')    rows = rows.filter(r => r.imageUrl);
        if (imgFilter === 'without') rows = rows.filter(r => !r.imageUrl);

        const total = res.data?.total || res.total || rows.length;
        totalPages  = res.data?.totalPages || res.totalPages || Math.ceil(total / LIMIT);

        if (!rows.length) {
          body.innerHTML = `<tr><td colspan="9">
            <div class="empty-state">
              <i class="fa-solid fa-inbox"></i>
              <h3>No return requests found</h3>
              <p>Try adjusting your filters</p>
            </div></td></tr>`;
          buildPagination('pg-btns', 'pg-info', 1, 1, 0, LIMIT, loadReturns);
          return;
        }

        body.innerHTML = rows.map(r => {
          const items   = r.items || [];
          const itemTxt = items.map(i => `${i.name} ×${i.quantity}`).join(', ');
          const weight  = r.weight
            ? `<span class="weight-badge"><i class="fa-solid fa-weight-scale"></i>${r.weight}g</span>`
            : `<span class="weight-badge no-weight">—</span>`;

          const imgCell = r.imageUrl
            ? `<img src="${r.imageUrl}" class="tbl-img" style="cursor:pointer"
                    onclick="window.open('${r.imageUrl}','_blank')"
                    title="Click to view full image">`
            : `<div class="tbl-img-placeholder" title="No image captured">
                 <i class="fa-solid fa-camera-slash"></i></div>`;

          return `<tr>
            <td style="font-family:monospace;font-size:.72rem;color:var(--neutral-400)">${r._id.slice(-10)}</td>
            <td>
              <code style="background:var(--neutral-100);padding:2px 7px;border-radius:5px;font-size:.82rem">
                ${r.lockerUserId || '—'}
              </code>
            </td>
            <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.82rem" title="${itemTxt}">
              ${itemTxt || '—'}
            </td>
            <td style="font-size:.82rem">${(r.reason || '—').replace(/_/g,' ')}</td>
            <td>${statusBadge(r.status)}</td>
            <td>${weight}</td>
            <td>${imgCell}</td>
            <td style="font-size:.75rem;color:var(--neutral-400)">${fmtDate(r.createdAt)}</td>
            <td>
              <button class="btn-action btn-ghost" style="font-size:.75rem;padding:5px 10px"
                      onclick="openDetail('${r._id}')">
                <i class="fa-solid fa-eye"></i> View
              </button>
            </td>
          </tr>`;
        }).join('');

        buildPagination('pg-btns', 'pg-info', page, totalPages, total, LIMIT, (p) => { page = p; loadReturns(); });

      } catch (err) {
        body.innerHTML = `<tr><td colspan="9">
          <div class="empty-state" style="color:var(--danger)">
            <i class="fa-solid fa-circle-exclamation"></i>
            <h3>Failed to load returns</h3>
            <p>${err.message}</p>
          </div></td></tr>`;
      }
    }

    // ── Open detail modal ─────────────────────────────────────────────────────
    window.openDetail = async function(returnId) {
      const modal = document.getElementById('modal');
      const mbody = document.getElementById('modal-body');
      const mtitle= document.getElementById('modal-title');
      modal.classList.add('open');
      mbody.innerHTML = `<div class="spinner-wrap"><div class="spin"></div></div>`;

      try {
        const rd  = await returnsAdminAPI.getById(returnId);
        const ret = rd.data?.return || rd.return || rd.data;

        // Try to fetch camera session
        let session = null;
        try {
          const sd = await cameraAdminAPI.getByReturn(returnId);
          session  = sd.data?.session || sd.session;
        } catch {}

        mtitle.textContent = `Return — ${returnId.slice(-10)}`;

        // Compute unlock code if secret is set
        let unlockCode = ret.unlockCode || null;
        if (!unlockCode && ret.lockerUserId && LOCKER_SECRET) {
          unlockCode = await generateLockerCode(ret.lockerUserId, LOCKER_SECRET);
        }

        const items = ret.items || [];

        mbody.innerHTML = `
          <!-- Locker info -->
          ${ret.lockerUserId ? `
          <div class="locker-box" style="margin-bottom:20px">
            <div class="locker-field">
              <label>Locker User ID</label>
              <div class="lf-val">${ret.lockerUserId}</div>
            </div>
            ${unlockCode ? `
            <div class="locker-field">
              <label>Today's Unlock Code</label>
              <div class="lf-val">${unlockCode}</div>
            </div>` : ''}
          </div>` : ''}

          <!-- Camera image -->
          <div class="camera-image-section" style="margin-bottom:20px">
            <h4><i class="fa-solid fa-camera me-1"></i> Camera Capture</h4>
            ${ret.imageUrl
              ? `<img src="${ret.imageUrl}" alt="Return image"
                      onclick="window.open('${ret.imageUrl}','_blank')"
                      title="Click to open full size">`
              : `<div class="no-image">
                   <i class="fa-solid fa-camera-slash"></i>
                   No image captured for this return
                 </div>`
            }
            ${ret.imageUploadedAt
              ? `<p style="margin-top:8px;font-size:.75rem;color:var(--neutral-400)">
                   Captured ${fmtDateTime(ret.imageUploadedAt)}
                 </p>` : ''}
          </div>

          <!-- Weight -->
          ${ret.weight ? `
          <div style="margin-bottom:20px;display:flex;align-items:center;gap:10px">
            <i class="fa-solid fa-weight-scale" style="color:var(--accent)"></i>
            <span style="font-weight:700">Recorded Weight:</span>
            <span class="weight-badge">
              <i class="fa-solid fa-weight-scale"></i>${ret.weight}g
            </span>
          </div>` : ''}

          <!-- Return details grid -->
          <div class="detail-grid" style="margin-bottom:20px">
            <div class="detail-field">
              <label>Status</label>
              <div class="field-val">${statusBadge(ret.status)}</div>
            </div>
            <div class="detail-field">
              <label>Reason</label>
              <div class="field-val">${(ret.reason || '—').replace(/_/g,' ')}</div>
            </div>
            <div class="detail-field">
              <label>Submitted</label>
              <div class="field-val">${fmtDateTime(ret.createdAt)}</div>
            </div>
            <div class="detail-field">
              <label>Expires</label>
              <div class="field-val">${fmtDate(ret.expiresAt)}</div>
            </div>
            ${ret.processedByBox ? `
            <div class="detail-field">
              <label>Processed By Box</label>
              <div class="field-val"><code>${ret.processedByBox}</code></div>
            </div>` : ''}
            ${ret.completedAt ? `
            <div class="detail-field">
              <label>Completed At</label>
              <div class="field-val">${fmtDateTime(ret.completedAt)}</div>
            </div>` : ''}
            ${ret.notes ? `
            <div class="detail-field" style="grid-column:1/-1">
              <label>Notes</label>
              <div class="field-val">${ret.notes}</div>
            </div>` : ''}
          </div>

          <!-- Items -->
          <div style="margin-bottom:20px">
            <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--neutral-400);margin-bottom:10px">
              Return Items
            </div>
            <ul class="items-list">
              ${items.map(i => `
              <li>
                <div>
                  <div style="font-weight:600">${i.name}</div>
                  <div style="font-size:.75rem;color:var(--neutral-400)">${i.color} · qty ${i.quantity}</div>
                </div>
              </li>`).join('') || '<li style="color:var(--neutral-400)">No items</li>'}
            </ul>
          </div>

          <!-- Camera session info -->
          ${session ? `
          <div class="panel" style="border:1px solid var(--neutral-200)">
            <div class="panel-header" style="padding:12px 16px">
              <i class="fa-solid fa-camera" style="color:var(--accent)"></i>
              <span class="panel-title" style="font-size:.88rem">Camera Session</span>
              <span class="badge ${session.status === 'confirmed' ? 'badge-confirmed' : 'badge-failed'}">${session.status}</span>
            </div>
            <div class="panel-body" style="padding:14px 16px">
              <div class="detail-grid">
                <div class="detail-field">
                  <label>Box ID</label>
                  <div class="field-val"><code>${session.boxId}</code></div>
                </div>
                <div class="detail-field">
                  <label>Attempt</label>
                  <div class="field-val">#${session.attemptNumber || 1}</div>
                </div>
                <div class="detail-field">
                  <label>File Size</label>
                  <div class="field-val">${session.fileSizeBytes ? Math.round(session.fileSizeBytes/1024) + ' KB' : '—'}</div>
                </div>
                <div class="detail-field">
                  <label>Format</label>
                  <div class="field-val">${session.format || '—'}</div>
                </div>
                ${session.capturedAt ? `
                <div class="detail-field">
                  <label>Captured At</label>
                  <div class="field-val">${fmtDateTime(session.capturedAt)}</div>
                </div>` : ''}
                ${session.deviceFirmware ? `
                <div class="detail-field">
                  <label>Firmware</label>
                  <div class="field-val"><code>${session.deviceFirmware}</code></div>
                </div>` : ''}
              </div>
            </div>
          </div>` : ''}

          <!-- Status update -->
          <div style="margin-top:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            <span style="font-size:.82rem;color:var(--neutral-600);font-weight:600">Update status:</span>
            ${['pending','completed','denied','expired'].map(s => `
              <button class="btn-action ${s === 'completed' ? 'btn-success' : s === 'denied' ? 'btn-danger' : 'btn-ghost'}"
                      style="font-size:.78rem"
                      onclick="updateStatus('${ret._id}','${s}')"
                      ${ret.status === s ? 'disabled style="opacity:.4;font-size:.78px"' : ''}>
                ${s.charAt(0).toUpperCase() + s.slice(1)}
              </button>`).join('')}
          </div>`;

      } catch (err) {
        mbody.innerHTML = `<div class="empty-state" style="color:var(--danger)">
          <i class="fa-solid fa-circle-exclamation"></i>
          <h3>Failed to load return details</h3>
          <p>${err.message}</p>
        </div>`;
      }
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.remove('open');
    };

    window.updateStatus = async function(id, status) {
      try {
        await returnsAdminAPI.updateStatus(id, status);
        toast(`Status updated to "${status}"`, 'success');
        closeModal();
        loadReturns();
      } catch (err) {
        toast('Failed to update status: ' + err.message, 'error');
      }
    };

    // ── Filters & search ──────────────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => { page = 1; loadReturns(); }, 380);
    });
    document.getElementById('status-filter').addEventListener('change', () => { page = 1; loadReturns(); });
    document.getElementById('image-filter').addEventListener('change', () => { page = 1; loadReturns(); });

    // ESC closes modal
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    loadReturns();
  </script>
</body>
</html>
