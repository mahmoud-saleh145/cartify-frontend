<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartify — Set New Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./CSS/animate.min.css" />
    <link rel="stylesheet" href="./CSS/wow.min.css" />
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <link rel="stylesheet" href="./CSS/bootstrap.min.css" />
    <link rel="stylesheet" href="./CSS/mdb.min.css" />
    <link rel="stylesheet" href="./CSS/Style.css" />
  <link rel="stylesheet" href="./CSS/cartify-ui.css" />
    <link rel="stylesheet" href="./CSS/auth-screens.css" />
  </head>
  <body class="auth-page min-vh-100 d-flex flex-column align-items-center justify-content-center bg-light m-0">
    <div class="container d-flex flex-column align-items-center px-3">
      <div class="login-container bg-white rounded-5 shadow-lg p-5 animate__animated animate__zoomIn animate__faster" style="max-width:520px;width:100%;">
        <div class="d-flex align-items-center justify-content-center mx-auto mb-3">
          <div class="auth-icon-circle"><i class="fa-solid fa-lock"></i></div>
        </div>
        <div class="text-center mb-4">
          <h1 class="h4 fw-bold mb-1 header-title">Set New Password</h1>
          <p class="text-muted small mb-0">Create a strong new password for your account.</p>
        </div>
        <form action="password-success.html">
          <div class="mb-3">
            <label for="new-password" class="form-label small fw-bold text-dark text-uppercase mb-1" style="letter-spacing:0.5px;font-size:0.72rem;">New Password</label>
            <div class="pw-field-wrapper">
              <input type="password" id="new-password" class="form-control custom-input border-0 bg-light rounded-pill py-2 ps-3" placeholder="••••••••" required />
              <button type="button" class="pw-toggle-btn toggle-pw" data-target="new-password" aria-label="Toggle password visibility">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="mb-2">
            <label for="confirm-password" class="form-label small fw-bold text-dark text-uppercase mb-1" style="letter-spacing:0.5px;font-size:0.72rem;">Confirm Password</label>
            <div class="pw-field-wrapper">
              <input type="password" id="confirm-password" class="form-control custom-input border-0 bg-light rounded-pill py-2 ps-3" placeholder="••••••••" required />
              <button type="button" class="pw-toggle-btn toggle-pw" data-target="confirm-password" aria-label="Toggle password visibility">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
          <div class="mb-3">
            <div class="d-flex gap-1 mb-1">
              <div class="security-segment" id="seg1"></div>
              <div class="security-segment" id="seg2"></div>
              <div class="security-segment" id="seg3"></div>
              <div class="security-segment" id="seg4"></div>
            </div>
            <small class="fw-bold text-uppercase" id="security-label" style="font-size:0.65rem;letter-spacing:0.5px;"></small>
          </div>
          <div id="match-error" class="text-danger small mb-2" style="display:none;font-size:0.8rem;">
            <i class="fa-solid fa-circle-exclamation me-1"></i>Passwords do not match.
          </div>
          <button type="submit" id="submit-btn" class="btn btn-primary w-100 rounded-pill py-2 mt-1 fw-bold primary-btn h-50">
            Reset Password <i class="fa-solid fa-arrow-right ms-1"></i>
          </button>
        </form>
        <div class="text-center mt-4">
          <a href="login.html" class="small fw-bold text-decoration-none text-primary">
            <i class="fa-solid fa-arrow-left me-1"></i> Return to Login
          </a>
        </div>
      </div>
      <p class="text-muted mt-4" style="font-size:0.65rem;letter-spacing:1px;text-transform:uppercase;">© 2026 Cartify. Secure Authentication.</p>
    </div>
    <script src="./Js/all.min.js"></script>
    <script src="./Js/wow.min.js"></script>
    <script>new WOW().init();</script>
    <script src="./Js/jquery.slim.min.js"></script>
    <script src="./Js/bootstrap.min.js"></script>
    <script src="./Js/mdb.umd.min.js"></script>
    <script>
      document.querySelectorAll('.toggle-pw').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var input = document.getElementById(this.getAttribute('data-target'));
          var icon = this.querySelector('i');
          if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye','fa-eye-slash'); }
          else { input.type = 'password'; icon.classList.replace('fa-eye-slash','fa-eye'); }
        });
      });
      var segColors = ['#e2e8f0','#ef4444','#f97316','#02067e','#22c55e'];
      var segLabels = ['','Security Level: Weak','Security Level: Fair','Security Level: Moderate','Security Level: Strong'];
      function calcStrength(val) {
        if (!val) return 0; var score = 0;
        if (val.length >= 6) score++; if (val.length >= 10) score++;
        if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
        if (/[0-9]/.test(val) && /[!@#$%^&*_\-+=]/.test(val)) score++;
        return Math.min(score, 4);
      }
      function updateStrength(val) {
        var s = calcStrength(val); var color = s === 0 ? '#e2e8f0' : segColors[s];
        document.getElementById('security-label').textContent = s === 0 ? '' : segLabels[s];
        document.getElementById('security-label').style.color = color;
        for (var i = 1; i <= 4; i++) { var seg = document.getElementById('seg'+i); if (seg) seg.style.background = i <= s ? color : '#e2e8f0'; }
      }
      document.getElementById('new-password').addEventListener('input', function() { updateStrength(this.value); checkMatch(); });
      function checkMatch() {
        var pw = document.getElementById('new-password').value;
        var cpw = document.getElementById('confirm-password').value;
        var err = document.getElementById('match-error');
        var confirmInput = document.getElementById('confirm-password');
        if (cpw.length === 0) { err.style.display='none'; confirmInput.style.borderColor=''; return; }
        if (pw !== cpw) { err.style.display='block'; confirmInput.style.borderColor='#ef4444'; }
        else { err.style.display='none'; confirmInput.style.borderColor='#22c55e'; }
      }
      document.getElementById('confirm-password').addEventListener('input', checkMatch);
      document.querySelector('form').addEventListener('submit', function(e) {
        var pw = document.getElementById('new-password').value;
        var cpw = document.getElementById('confirm-password').value;
        if (pw !== cpw) { e.preventDefault(); document.getElementById('match-error').style.display='block'; document.getElementById('confirm-password').focus(); }
      });
    </script>
  </body>
</html>
